<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annie Swanson Stuff</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="stuff.js" defer></script>
  </head>
  <body>
    <main class="site-grid">
      <div class="frame frame-corner-top-left">
        <img
          class="corner-painting corner-top-left"
          src="assets/images/painting.jpeg"
          alt=""
        />
      </div>

      <div class="frame frame-top">
        <a href="index.html" class="frame-link frame-link-home" aria-label="Go to home page">
          <div class="brand-wrap">
            <h1 class="brand">Annie Swanson</h1>
          </div>
        </a>
      </div>

      <div class="frame frame-corner-top-right">
        <img
          class="corner-painting corner-top-right"
          src="assets/images/painting.jpeg"
          alt=""
        />
      </div>

      <div class="frame frame-nav frame-nav-left"></div>

      <div class="frame frame-nav frame-nav-right"></div>

      <div class="frame frame-content">
        <div class="content-panel content-panel-stuff">
          <ul class="content-list content-list-stuff">
            <li>NEW YORK, NY</li>
            <li>
              <a href="https://www.instagram.com/i.hate.social.media/" target="_blank" rel="noreferrer">
                @I.HATE.SOCIAL.MEDIA
              </a>
            </li>
            <li>
              <a href="https://x.com/i_h8_scial_mdia" target="_blank" rel="noreferrer">
                @I_H8_SCIAL_MDIA
              </a>
            </li>
            <li>
              <a href="https://www.linkedin.com/in/annie-swanson/" target="_blank" rel="noreferrer">
                LINKEDIN
              </a>
            </li>
            <li>
              <a href="https://www.are.na/annie-swanson/channels" target="_blank" rel="noreferrer">
                ARE.NA
              </a>
            </li>
            <li>
              <a href="https://substack.com/@conglomerationofwhat" target="_blank" rel="noreferrer">
                BLOG
              </a>
            </li>
            <li>
              <button
                type="button"
                class="stuff-action"
                data-copy-email
                data-email="annie.swanson@gmail.com"
                aria-live="polite"
              >
                <span class="stuff-action-label">ANNIE.SWANSON@GMAIL.COM</span>
                <span class="stuff-copy-status" aria-hidden="true"></span>
              </button>
            </li>
            <li class="stuff-preview-row">
              <button type="button" class="stuff-action stuff-preview-trigger">
                PREVIOUS VERSIONS OF ANNIESWANSON.COM
              </button>
            </li>
          </ul>

          <div class="stuff-preview-panel" aria-hidden="true">
            <img
              src="assets/stuff/previous-version-1.png"
              alt="Previous annieswanson.com version on a vintage computer"
            />
            <img
              src="assets/stuff/previous-version-2.png"
              alt="Previous annieswanson.com portfolio page with mural background"
            />
          </div>
        </div>
      </div>

      <div class="frame frame-nav frame-nav-bottom-left"></div>

      <div class="frame frame-nav frame-nav-bottom-right">
        <a href="stuff.html" class="frame-link frame-link-nav" aria-label="Go to stuff page">
          <span class="nav-label">Stuff</span>
        </a>
      </div>

      <div class="frame frame-corner-bottom-left">
        <img
          class="corner-painting corner-bottom-left"
          src="assets/images/painting.jpeg"
          alt=""
        />
      </div>

      <div class="frame frame-footer">
        <a href="index.html" class="frame-link frame-link-home" aria-label="Go to home page">
          <span class="footer-mark">annieswanson.com</span>
        </a>
      </div>

      <div class="frame frame-corner-bottom-right">
        <img
          class="corner-painting corner-bottom-right"
          src="assets/images/painting.jpeg"
          alt=""
        />
      </div>
    </main>
  </body>
</html>
